name: Unzip smart-home-agent.zip

on:
  push:
    paths:
      - smart-home-agent.zip

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Recreate output directory
        run: |
          rm -rf smart-home-agent
          mkdir -p smart-home-agent

      - name: Unzip into smart-home-agent/
        run: unzip -o smart-home-agent.zip -d smart-home-agent

      - name: Commit & push extracted files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add smart-home-agent
          git diff --cached --quiet || git commit -m "Unzip smart-home-agent.zip"
          git push
