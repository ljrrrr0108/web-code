name: Unzip smart-home-agent.zip

on:
  push:
    paths:
      - smart-home-agent.zip

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # 可选：避免 actions 自己提交导致重复运行
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Recreate output directory
        run: |
          rm -rf smart-home-agent
          mkdir -p smart-home-agent

      - name: Unzip
        run: unzip -o smart-home-agent.zip -d smart-home-agent

      - name: Commit & push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add smart-home-agent
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Unzip smart-home-agent.zip [skip ci]"
          git pull --rebase
          git push
